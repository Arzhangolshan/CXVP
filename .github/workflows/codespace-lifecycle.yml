- name: Create a new codespace via GitHub API
  run: |
    echo "Requesting a new codespace from API..."
    RESPONSE=$(curl -L -X POST \
      -H "Accept: application/vnd.github+json" \
      -H "Authorization: Bearer ${{ secrets.CODESPACE_ACCESS_TOKEN }}" \
      -H "X-GitHub-Api-Version: 2022-11-28" \
      https://api.github.com/repos/${{ github.repository }}/codespaces \
      -d '{"ref":"master","machine":"standardLinux32gb"}')
    
    echo "API Response:"
    echo "$RESPONSE"
    
    # بررسی وجود خطا
    if echo "$RESPONSE" | jq -e '.message' > /dev/null; then
      echo "Error from API: $(echo "$RESPONSE" | jq -r '.message')"
      exit 1
    fi
    
    # استخراج نام codespace
    CODESPACE_NAME=$(echo "$RESPONSE" | jq -r '.name')
    if [ -z "$CODESPACE_NAME" ] || [ "$CODESPACE_NAME" = "null" ]; then
      echo "Failed to get codespace name. Full response:"
      echo "$RESPONSE"
      exit 1
    fi
    
    echo "CODESPACE_NAME=$CODESPACE_NAME" >> $GITHUB_ENV

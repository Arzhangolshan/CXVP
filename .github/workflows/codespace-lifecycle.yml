name: Codespace Lifecycle Manager

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'create'
        type: choice
        options:
          - create
          - stop
          - delete

jobs:
  manage-codespace:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup GitHub CLI
      run: |
        type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh -y

    - name: Authenticate GitHub CLI
      run: echo "${{ secrets.CODESPACE_ACCESS_TOKEN }}" | gh auth login --with-token

    # =============== CREATE ===============
    - name: Create Codespace
      if: github.event.inputs.action == 'create'
      id: create
      run: |
        echo "Creating a new codespace..."
        
        # ایجاد codespace و گرفتن نام آن
        CODESPACE_NAME=$(gh codespace create \
          --repo ${{ github.repository }} \
          --ref master \
          --machine standardLinux32gb \
          --display-name "CXVP-Auto" \
          --quiet 2>&1)
        
        # بررسی موفقیت
        if echo "$CODESPACE_NAME" | grep -q "error"; then
          echo "❌ Failed to create codespace: $CODESPACE_NAME"
          exit 1
        fi
        
        echo "✅ Codespace created: $CODESPACE_NAME"
        echo "CODESPACE_NAME=$CODESPACE_NAME" >> $GITHUB_ENV
        echo "name=$CODESPACE_NAME" >> $GITHUB_OUTPUT

    - name: Wait for codespace to be ready
      if: github.event.inputs.action == 'create'
      run: |
        echo "Waiting for codespace to be ready..."
        for i in {1..30}; do
          sleep 10
          STATE=$(gh api "repos/${{ github.repository }}/codespaces" --jq ".[] | select(.name==\"${{ env.CODESPACE_NAME }}\") | .state")
          if [ "$STATE" = "Available" ]; then
            echo "✅ Codespace is ready!"
            exit 0
          fi
          echo "Attempt $i/30 - State: $STATE"
        done
        echo "❌ Timeout waiting for codespace to become available"
        exit 1

    - name: Extract config.json from codespace
      if: github.event.inputs.action == 'create'
      run: |
        echo "Extracting /etc/config.json from codespace..."
        gh codespace cp -c "${{ env.CODESPACE_NAME }}":/etc/config.json ./config_text.txt || {
          echo "⚠️ Could not copy config.json. Trying alternative path..."
          gh codespace cp -c "${{ env.CODESPACE_NAME }}":/app/config.json ./config_text.txt || {
            echo "❌ Failed to extract config.json"
            exit 1
          }
        }
        
        echo "✅ Config saved to config_text.txt"
        cat config_text.txt

    - name: Commit and push config file
      if: github.event.inputs.action == 'create'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add config_text.txt
        git commit -m "Update g2ray config [skip ci]" || echo "No changes to commit"
        git push

    # =============== STOP ===============
    - name: Stop Codespace
      if: github.event.inputs.action == 'stop'
      run: |
        echo "Stopping codespace..."
        # ابتدا سعی می‌کنیم نام codespace را از قبل داشته باشیم، اگر نه از user بپرسیم
        if [ -z "${{ env.CODESPACE_NAME }}" ]; then
          echo "No CODESPACE_NAME in env. Please provide name manually or use delete."
          exit 1
        fi
        gh codespace stop -c "${{ env.CODESPACE_NAME }}"

    # =============== DELETE ===============
    - name: Delete Codespace
      if: github.event.inputs.action == 'delete'
      run: |
        echo "Deleting codespace..."
        if [ -z "${{ env.CODESPACE_NAME }}" ]; then
          echo "No CODESPACE_NAME in env. Please provide name manually."
          exit 1
        fi
        gh codespace delete -c "${{ env.CODESPACE_NAME }}" --force

name: Codespace Lifecycle Manager

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'create'
        type: choice
        options:
          - create
          - stop
          - delete

jobs:
  manage-codespace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.CODESPACE_ACCESS_TOKEN }}" | gh auth login --with-token

      # =============== CREATE ===============
      - name: Create Codespace
        if: github.event.inputs.action == 'create'
        id: create
        run: |
          set +e
          echo "Creating a new codespace..."
          # تشخیص شاخه پیش‌فرض (main یا master)
          git ls-remote --heads origin main > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "Branch 'main' does not exist, using 'master'"
            DEFAULT_BRANCH="master"
          else
            DEFAULT_BRANCH="main"
          fi
          echo "Using branch: $DEFAULT_BRANCH"

          # ایجاد codespace با فلگ صحیح --branch
          gh codespace create \
            --repo ${{ github.repository }} \
            --branch "$DEFAULT_BRANCH" \
            --machine standardLinux32gb \
            --display-name "CXVP-Auto" \
            --json name > codespace_output.json 2>&1

          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          echo "Raw output:"
          cat codespace_output.json

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ gh codespace create failed. Check output above."
            exit 1
          fi

          CODESPACE_NAME=$(jq -r '.name' codespace_output.json 2>/dev/null)
          if [ -z "$CODESPACE_NAME" ] || [ "$CODESPACE_NAME" = "null" ]; then
            echo "❌ Failed to extract codespace name."
            exit 1
          fi

          echo "✅ Codespace created: $CODESPACE_NAME"
          echo "CODESPACE_NAME=$CODESPACE_NAME" >> $GITHUB_ENV
          echo "name=$CODESPACE_NAME" >> $GITHUB_OUTPUT
          set -e

      - name: Wait for codespace to be ready
        if: github.event.inputs.action == 'create'
        run: |
          if [ -z "${{ env.CODESPACE_NAME }}" ]; then
            echo "❌ CODESPACE_NAME is empty"
            exit 1
          fi
          echo "Waiting for codespace ${{ env.CODESPACE_NAME }} to be ready..."
          for i in {1..40}; do
            sleep 15
            STATE=$(gh api "repos/${{ github.repository }}/codespaces" --jq ".[] | select(.name==\"${{ env.CODESPACE_NAME }}\") | .state" 2>/dev/null || echo "unknown")
            if [ "$STATE" = "Available" ]; then
              echo "✅ Codespace is ready!"
              exit 0
            fi
            echo "Attempt $i/40 - State: ${STATE:-not found}"
          done
          echo "❌ Timeout waiting for codespace to become available"
          exit 1

      - name: Extract config.json from codespace
        if: github.event.inputs.action == 'create'
        run: |
          echo "Extracting config from ${{ env.CODESPACE_NAME }}..."
          if gh codespace cp -c "${{ env.CODESPACE_NAME }}":/etc/config.json ./config_text.txt 2>/dev/null; then
            echo "✅ Config saved from /etc/config.json"
          elif gh codespace cp -c "${{ env.CODESPACE_NAME }}":/app/config.json ./config_text.txt 2>/dev/null; then
            echo "✅ Config saved from /app/config.json"
          else
            echo "❌ Failed to extract config.json from both paths"
            exit 1
          fi
          echo "Content of config_text.txt:"
          cat config_text.txt

      - name: Commit and push config file
        if: github.event.inputs.action == 'create'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config_text.txt
          git commit -m "Update g2ray config [skip ci]" || echo "No changes to commit"
          git push

      # =============== STOP ===============
      - name: Stop Codespace
        if: github.event.inputs.action == 'stop'
        run: |
          if [ -z "${{ env.CODESPACE_NAME }}" ]; then
            echo "❌ No CODESPACE_NAME in environment. Cannot stop."
            exit 1
          fi
          echo "Stopping codespace: ${{ env.CODESPACE_NAME }}"
          gh codespace stop -c "${{ env.CODESPACE_NAME }}"

      # =============== DELETE ===============
      - name: Delete Codespace
        if: github.event.inputs.action == 'delete'
        run: |
          if [ -z "${{ env.CODESPACE_NAME }}" ]; then
            echo "❌ No CODESPACE_NAME in environment. Cannot delete."
            exit 1
          fi
          echo "Deleting codespace: ${{ env.CODESPACE_NAME }}"
          gh codespace delete -c "${{ env.CODESPACE_NAME }}" --force
